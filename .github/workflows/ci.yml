name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: unit · contract · integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install (core + web + dev)
        run: |
          uv venv --python 3.11
          uv pip install -e ".[web,dev]"
      - name: Run test suite (excludes live + e2e)
        run: uv run pytest

  e2e:
    name: web e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install + browser
        run: |
          uv venv --python 3.11
          uv pip install -e ".[web,dev]"
          uv run playwright install --with-deps chromium
      - name: Run e2e
        run: uv run pytest -m e2e
